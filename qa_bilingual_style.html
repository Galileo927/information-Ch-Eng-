<style>
:root {
  --bg: #f7f1e8;
  --paper: #fffdf9;
  --ink: #22303a;
  --muted: #6b7680;
  --line: #dbcbb5;
  --accent: #a34a28;
  --accent-soft: #f7e7d8;
  --question: #f4f8fb;
  --answer: #f8f2e7;
}

html {
  color: var(--ink);
  background:
    radial-gradient(circle at top right, rgba(163, 74, 40, 0.08), transparent 24%),
    linear-gradient(180deg, #f6efe5 0%, #faf7f1 24%, #fdfcf8 100%);
}

body {
  margin: 0 auto;
  max-width: 1120px;
  padding: 36px 18px 72px;
  font-family: "STIX Two Text", "Noto Serif SC", Georgia, "Times New Roman", serif;
  line-height: 1.72;
}

header {
  margin-bottom: 2.4rem;
}

h1, h2, h3, h4 {
  color: #2b231b;
  line-height: 1.3;
}

h1 {
  font-size: 2.35rem;
  margin-bottom: 0.7rem;
  padding-bottom: 0.7rem;
  border-bottom: 3px solid var(--line);
}

h2 {
  margin-top: 2.6rem;
  border-top: 1px solid rgba(163, 74, 40, 0.18);
  padding-top: 0.8rem;
}

h3 {
  margin-top: 1.9rem;
  color: #7b341e;
}

h4 {
  margin-top: 0;
  margin-bottom: 0.8rem;
}

#TOC {
  background: rgba(255, 255, 255, 0.74);
  border: 1px solid rgba(163, 74, 40, 0.12);
  border-radius: 18px;
  padding: 1.15rem 1.25rem;
  margin-bottom: 2rem;
  box-shadow: 0 12px 28px rgba(61, 43, 27, 0.06);
}

#TOC ul {
  padding-left: 1.2rem;
}

#TOC a {
  color: #7a341d;
  text-decoration: none;
}

#TOC a:hover {
  text-decoration: underline;
}

blockquote {
  margin: 1rem 0 1.4rem;
  padding: 0.95rem 1rem;
  border-left: 4px solid var(--accent);
  background: rgba(255, 255, 255, 0.72);
  color: var(--muted);
}

hr {
  border: 0;
  border-top: 1px solid rgba(163, 74, 40, 0.16);
  margin: 2rem 0;
}

p code, li code {
  background: rgba(163, 74, 40, 0.08);
  border-radius: 0.35rem;
  padding: 0.08rem 0.35rem;
}

.qa-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1rem;
  margin: 1rem 0 1.35rem;
}

.qa-card {
  padding: 1.05rem 1.05rem 1.1rem;
  border-radius: 18px;
  border: 1px solid rgba(117, 83, 52, 0.14);
  box-shadow: 0 12px 30px rgba(63, 46, 28, 0.05);
  overflow-x: auto;
}

.question-card {
  background: linear-gradient(180deg, rgba(248, 252, 255, 0.94), rgba(238, 245, 250, 0.92));
}

.answer-card {
  background: linear-gradient(180deg, rgba(255, 251, 245, 0.95), rgba(247, 238, 224, 0.96));
  border-left: 4px solid var(--accent);
}

.qa-card p:first-child,
.qa-card h4:first-child {
  margin-top: 0;
}

.qa-card p:last-child {
  margin-bottom: 0;
}

.inline-figure {
  display: block;
  width: 100%;
  height: auto;
  margin: 0.9rem 0;
  border-radius: 14px;
  border: 1px solid rgba(117, 83, 52, 0.14);
  box-shadow: 0 10px 24px rgba(63, 46, 28, 0.06);
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0 1.2rem;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 10px 24px rgba(63, 46, 28, 0.05);
}

th, td {
  padding: 0.68rem 0.78rem;
  border: 1px solid rgba(117, 83, 52, 0.14);
  text-align: center;
}

thead th {
  background: #efe2cf;
}

tbody tr:nth-child(odd) {
  background: rgba(255, 255, 255, 0.76);
}

tbody tr:nth-child(even) {
  background: rgba(248, 243, 236, 0.96);
}

math[display="block"] {
  margin: 0.45rem auto;
}

img {
  max-width: 100%;
  height: auto;
}

@media (max-width: 860px) {
  .qa-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  body {
    padding: 22px 14px 48px;
  }

  h1 {
    font-size: 1.92rem;
  }
}

@media print {
  html {
    background: #fff;
  }

  body {
    max-width: none;
    padding: 0;
  }

  #TOC,
  .qa-card,
  table,
  .inline-figure {
    box-shadow: none;
  }
}
</style>
