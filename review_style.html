<style>
:root {
  --paper: #fbf8f1;
  --ink: #1f2933;
  --muted: #5f6c7b;
  --rule: #d7c9ad;
  --accent: #8c3b1f;
  --accent-soft: #f1e2cf;
  --note: #eef3f7;
  --answer: #f3efe8;
  --literal: #f6f1e8;
  --table-head: #efe4d2;
}

html {
  background:
    radial-gradient(circle at top left, rgba(197, 145, 92, 0.12), transparent 26%),
    linear-gradient(180deg, #f4efe5 0%, #f9f6ef 22%, #fcfbf7 100%);
  color: var(--ink);
}

body {
  margin: 0 auto;
  max-width: 980px;
  padding: 40px 28px 72px;
  font-family: "STIX Two Text", "Noto Serif SC", Georgia, "Times New Roman", serif;
  line-height: 1.75;
}

header {
  margin-bottom: 2.5rem;
  text-align: left;
}

h1, h2, h3, h4 {
  color: #2a1e12;
  line-height: 1.3;
}

h1 {
  font-size: 2.3rem;
  margin-bottom: 0.8rem;
  padding-bottom: 0.6rem;
  border-bottom: 3px solid var(--rule);
}

h2 {
  margin-top: 2.6rem;
  padding-top: 0.4rem;
  border-top: 1px solid rgba(140, 59, 31, 0.2);
}

h3 {
  margin-top: 1.7rem;
  color: #6f2f18;
}

#TOC {
  background: rgba(255, 255, 255, 0.72);
  border: 1px solid rgba(140, 59, 31, 0.14);
  border-radius: 18px;
  padding: 1.2rem 1.35rem;
  margin-bottom: 2rem;
  box-shadow: 0 14px 32px rgba(64, 42, 22, 0.06);
  backdrop-filter: blur(6px);
}

#TOC a {
  color: #6d2f1a;
  text-decoration: none;
}

#TOC a:hover {
  text-decoration: underline;
}

p code, li code {
  background: rgba(140, 59, 31, 0.08);
  border-radius: 0.35rem;
  padding: 0.1rem 0.35rem;
  font-size: 0.95em;
}

blockquote {
  margin: 1.1rem 0;
  padding: 0.9rem 1rem;
  background: rgba(255, 255, 255, 0.66);
  border-left: 4px solid var(--accent);
  color: var(--muted);
}

.formula-block {
  margin: 1.1rem 0 1.25rem;
  padding: 0.9rem 1rem;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(247, 241, 229, 0.92));
  border: 1px solid rgba(140, 59, 31, 0.14);
  border-left: 4px solid var(--accent);
  border-radius: 14px;
  overflow-x: auto;
  box-shadow: 0 10px 28px rgba(84, 53, 28, 0.06);
}

.formula-block p {
  margin: 0;
}

math[display="block"] {
  margin: 0 auto;
}

.note-block,
.answer-block {
  margin: 1rem 0;
  padding: 0.9rem 1rem;
  border-radius: 14px;
}

.note-block {
  background: var(--note);
  border: 1px solid rgba(72, 107, 135, 0.14);
}

.answer-block {
  background: var(--answer);
  border: 1px solid rgba(140, 59, 31, 0.12);
  font-weight: 600;
}

.note-block p,
.answer-block p {
  margin: 0;
}

.literal-block {
  margin: 1rem 0;
}

.literal-block pre {
  margin: 0;
  padding: 0.9rem 1rem;
  white-space: pre-wrap;
  background: var(--literal);
  border: 1px solid rgba(140, 59, 31, 0.12);
  border-radius: 14px;
  color: #3f3429;
  font-family: "SFMono-Regular", Menlo, Consolas, monospace;
  font-size: 0.92rem;
  line-height: 1.55;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin: 1rem 0 1.4rem;
  overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 10px 24px rgba(64, 42, 22, 0.05);
}

thead th {
  background: var(--table-head);
}

th, td {
  padding: 0.7rem 0.8rem;
  border: 1px solid rgba(117, 90, 59, 0.16);
  text-align: center;
}

tbody tr:nth-child(even) {
  background: rgba(255, 255, 255, 0.58);
}

tbody tr:nth-child(odd) {
  background: rgba(250, 246, 239, 0.92);
}

hr {
  border: 0;
  border-top: 1px solid rgba(140, 59, 31, 0.18);
  margin: 2rem 0;
}

img {
  max-width: 100%;
  height: auto;
}

@media (max-width: 720px) {
  body {
    padding: 22px 16px 48px;
  }

  h1 {
    font-size: 1.85rem;
  }

  #TOC {
    padding: 1rem;
  }
}

@media print {
  html {
    background: #fff;
  }

  body {
    max-width: none;
    padding: 0;
    background: #fff;
  }

  #TOC,
  .formula-block,
  .note-block,
  .answer-block,
  .literal-block pre,
  table {
    box-shadow: none;
  }
}
</style>
